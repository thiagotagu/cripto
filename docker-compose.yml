services:
  postgres:
    image: postgres:16-alpine
    container_name: cripto-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cripto}
      POSTGRES_USER: ${POSTGRES_USER:-cripto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cripto}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cripto-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-cripto}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-cripto}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-cripto}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
      APP_MONITOR_FIXED_RATE_MS: ${APP_MONITOR_FIXED_RATE_MS:-60000}
      APP_PRICE_BASE_URL: ${APP_PRICE_BASE_URL:-https://api.coingecko.com/api/v3}
      APP_WALLET_ETHPLORER_BASE_URL: ${APP_WALLET_ETHPLORER_BASE_URL:-https://api.ethplorer.io}
    ports:
      - "${BACKEND_PORT:-8081}:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:${BACKEND_PORT:-8081}/api
    container_name: cripto-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  postgres-data:
