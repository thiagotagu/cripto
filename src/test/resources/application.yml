spring:
  datasource:
    url: jdbc:h2:mem:cripto;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop

app:
  cors:
    allowed-origins: http://localhost:5173
  monitor:
    fixed-rate-ms: 600000
  price:
    base-url: https://api.coingecko.com/api/v3
