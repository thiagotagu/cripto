spring:
  application:
    name: cripto-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cripto}
    username: ${SPRING_DATASOURCE_USERNAME:cripto}
    password: ${SPRING_DATASOURCE_PASSWORD:cripto}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  monitor:
    fixed-rate-ms: ${APP_MONITOR_FIXED_RATE_MS:60000}
  price:
    base-url: ${APP_PRICE_BASE_URL:https://api.coingecko.com/api/v3}
  wallet:
    ethplorer-base-url: ${APP_WALLET_ETHPLORER_BASE_URL:https://api.ethplorer.io}
